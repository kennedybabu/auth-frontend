<div class="w-full h-screen flex items-center justify-center">
    <div class="flex flex-col flex-1 h-full">
        <div class="mt-[15%]"> 
            <form class="mx-auto md:w-[60%]" [formGroup]="resetPasswordForm">
                <h1 class="text-center mb-5 text-3xl">Recover Account</h1>
                <div class="input-wrapper">
                    <label for="email">Email</label>
                    <input type="text" placeholder="Email..." formControlName="email">
                </div>
                <div class="my-4 flex flex-col w-full p-1">
                    <button class="w-full shadow submit-btn">Reset Password</button>
                </div>

                <hr class="my-4">
                <!-- <div class="w-full text-center my-5">
                    <small>Don't have an account? <a routerLink="/sign-up" class="cursor-pointer">sign up</a></small>
                </div> -->
            </form>
        </div>
    </div>
    <div class="hidden auth-bg md:flex md:flex-1 h-full bg-red-100 rounded-tl-[50px] rounded-bl-[50px]">
        
    </div>
</div>
