<div class="w-full h-screen flex items-center justify-center">
    <div class="flex flex-col flex-1 h-full">
        <div class="mt-[15%]"> 
            <form class="mx-auto md:w-[60%]" [formGroup]="signupForm">
                <h1 class="text-center mb-5 text-3xl">Get Started Now</h1>
                <div class="flex flex-col lg:flex-row items-center justify-between gap-3">
                    <div class="input-wrapper w-full">
                        <label for="firstName" class="text-sm">First Name</label>
                        <input type="text" placeholder="First Name..." formControlName="firstName">
                    </div>
                    <div class="input-wrapper w-full">
                        <label for="lastName" class="text-sm">Last Name</label>
                        <input type="text" placeholder="Last Name..." formControlName="lastName">
                    </div>
                </div>
                <div class="input-wrapper">
                    <label for="email">Email</label>
                    <input type="text" placeholder="Email..." formControlName="email">
                </div>
                <div class="input-wrapper">
                    <label for="password">Password</label>
                    <input type="password" placeholder="Password..." formControlName="password">
                </div>
                <div class="my-4 flex flex-col w-full p-1">
                    <button class="w-full shadow submit-btn">signup</button>
                </div>

                <hr class="my-4">

                <div class="flex flex-col lg:flex-row items-center mt-5 justify-center gap-3 w-full">
                    <button class="shadow px-2 w-full"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.3.1 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M447.1 332.7C446.9 296 463.5 268.3 497.1 247.9C478.3 221 449.9 206.2 412.4 203.3C376.9 200.5 338.1 224 323.9 224C308.9 224 274.5 204.3 247.5 204.3C191.7 205.2 132.4 248.8 132.4 337.5C132.4 363.7 137.2 390.8 146.8 418.7C159.6 455.4 205.8 545.4 254 543.9C279.2 543.3 297 526 329.8 526C361.6 526 378.1 543.9 406.2 543.9C454.8 543.2 496.6 461.4 508.8 424.6C443.6 393.9 447.1 334.6 447.1 332.7zM390.5 168.5C417.8 136.1 415.3 106.6 414.5 96C390.4 97.4 362.5 112.4 346.6 130.9C329.1 150.7 318.8 175.2 321 202.8C347.1 204.8 370.9 191.4 390.5 168.5z"/></svg>sign with Google</button>
                    <button class="shadow px-5 w-full"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.3.1 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M564 325.8C564 467.3 467.1 568 324 568C186.8 568 76 457.2 76 320C76 182.8 186.8 72 324 72C390.8 72 447 96.5 490.3 136.9L422.8 201.8C334.5 116.6 170.3 180.6 170.3 320C170.3 406.5 239.4 476.6 324 476.6C422.2 476.6 459 406.2 464.8 369.7L324 369.7L324 284.4L560.1 284.4C562.4 297.1 564 309.3 564 325.8z"/></svg>sign with Apple</button>
                </div>
            </form>
        </div>
    </div>
    <div class="hidden md:flex md:flex-1 h-full bg-red-100 rounded-tl-[50px] rounded-bl-[50px]">
        
    </div>
</div>
